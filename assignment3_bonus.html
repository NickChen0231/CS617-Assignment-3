<html>
 <head>
   <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
 </head>
 <body>
 <div id='p1'></div>
 <div id='p2'></div>
 <script>

  var years = [2023, 2024, 2025]

  var spy = [636, 485, 535]

  var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sept', 'Oct', 'Nov', 'Dec'];

  var spm_2023 = [52, 36, 35, 42, 50, 63, 73, 61, 50, 58, 55, 61]

  var spm_2024 = [29, 25, 23, 27, 51, 51, 68, 50, 50, 37, 42, 32]

  var spm_2025 = [33, 31, 42, 51, 45, 53, 61, 59, 51, 36, 40, 33];

  var shootings = {
    x: years,
    y: spy
  }

  var layout = {
    title: 'Shootings per Year',
    xaxis: { tickvals: [2023, 2024, 2025] },
    yaxis: { rangemode: 'tozero' }
  };

  var data_by_year = {
    2023: spm_2023,
    2024: spm_2024,
    2025: spm_2025
  };

  var layout_monthly = {
    title: 'Shootings per Month',
    yaxis: { rangemode: 'tozero' }
  };

  var shootings_2023 = {
    x: months,
    y: spm_2023,
    name: '2023'
  };

  var shootings_2024 = {
   x: months,
   y: spm_2024,
   name: '2024'
  };

  var shootings_2025 = {
    x: months,
    y: spm_2025,
    name: '2025'
  };

  var data = [shootings_2023, shootings_2024, shootings_2025]

  Plotly.newPlot('p1', [shootings], layout);
  Plotly.newPlot('p2', data, layout_monthly)

  document.getElementById('p1').on('plotly_click', function(eventdata) {
    var year = eventdata.points[0].x;
    Plotly.react('p2', [{ x: months, y: data_by_year[year], name: String(year) }], {
      title: year + ' Shootings by Month',
      yaxis: { rangemode: 'tozero' }
    });
  });

</script>
 </body>
<html>
